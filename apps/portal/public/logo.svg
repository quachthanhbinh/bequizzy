<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Teal rounded-square background (#0d9488 = teal-600 brand primary) -->
  <rect width="100" height="100" rx="22" fill="#0d9488"/>

  <defs>
    <!-- Ring mask: outer r=36, inner r=21 (thick annulus) -->
    <mask id="ring">
      <rect width="100" height="100" fill="black"/>
      <circle cx="50" cy="50" r="36" fill="white"/>
      <circle cx="50" cy="50" r="21" fill="black"/>
    </mask>

    <!--
      The logo mark is a circular "looping arrow" made of two arc-pieces.
      A diagonal band (/) at ~27° from vertical splits the ring into:
        Piece A – right arc  (1-o'clock → CW → 7-o'clock)
        Piece B – left arc   (7-o'clock → CW → 1-o'clock)
      The band's two boundary lines define the gap (rhombus negative-space).
    -->

    <!-- Clip A: everything to the RIGHT of the lower-left diagonal edge -->
    <clipPath id="ca">
      <polygon points="67,8 100,0 100,100 28,92"/>
    </clipPath>

    <!-- Clip B: everything to the LEFT of the parallel upper-right diagonal edge -->
    <clipPath id="cb">
      <polygon points="0,0 72,8 33,92 0,100"/>
    </clipPath>
  </defs>

  <!-- Piece A: right arc with diagonal tail (upper-right & lower-left cuts) -->
  <rect width="100" height="100" fill="white" mask="url(#ring)" clip-path="url(#ca)"/>

  <!-- Piece B: left arc with diagonal tail -->
  <rect width="100" height="100" fill="white" mask="url(#ring)" clip-path="url(#cb)"/>
</svg>
