name = "page"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Entry point — proxies all requests to static assets in out/
main = "worker.js"

[assets]
directory = "./out"
binding = "ASSETS"

# ── Production environment ────────────────────────────────────────────────────
# Deploy with: wrangler deploy --env production
[env.production]
name = "page"
route = { pattern = "revlooper.com/*", zone_name = "revlooper.com" }

[env.production.assets]
directory = "./out"
binding = "ASSETS"
