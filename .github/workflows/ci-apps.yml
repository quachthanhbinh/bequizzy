name: CI - Frontend Apps

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - '.github/workflows/ci-apps.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - portal
          - page

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Type check
        working-directory: apps/${{ matrix.app }}
        run: npx tsc --noEmit

      - name: Lint
        working-directory: apps/${{ matrix.app }}
        run: npm run lint

      - name: Run tests
        working-directory: apps/${{ matrix.app }}
        run: npm run test

      - name: Build
        working-directory: apps/${{ matrix.app }}
        run: npm run build
